name: Submit to CodeSpell
on:
  push:
    branches:
      - master

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Repository
        uses: actions/checkout@v4

      - name: Submit to CodeSpell
        uses: code-spell/codespell-submission-action@v1
        with:
          content-id: e5317b2d-cf74-49b4-91e0-9a3aedc29a4c
          language: JAVASCRIPT
          username: ${{ secrets.CODESPELL_USERNAME }}
          password: ${{ secrets.CODESPELL_PASSWORD }}
          api-url: https://api-dev.codespell.net
          auth-url: https://auth-dev.codespell.net
          auth-realm: codespell-dev
